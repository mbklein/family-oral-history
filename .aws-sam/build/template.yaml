Transform: AWS::Serverless-2016-10-31
Parameters:
  HostName:
    Type: String
  DomainName:
    Type: String
  SSLCertificateArn:
    Type: String
  AuthString:
    Type: String
    AllowedPattern: ^\w.+:\w.+$
Resources:
  ContentBucket:
    Type: AWS::S3::Bucket
  ContentBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket:
        Ref: ContentBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
        - Effect: Allow
          Action:
          - s3:GetObject
          Resource:
          - Fn::Sub: ${ContentBucket.Arn}/*
          Principal:
            Service: cloudfront.amazonaws.com
          Condition:
            StringEquals:
              AWS:SourceArn:
                Fn::Sub: arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}
  OriginAccess:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name:
          Fn::Sub: ${ContentBucket}-Access
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4
  CloudFrontAuthFunction:
    Type: AWS::CloudFront::Function
    Properties:
      Name: KBK-History-Auth
      AutoPublish: true
      FunctionCode:
        Fn::Sub: "function handler(event) {\n  const request = event.request;\n  const\
          \ headers = request.headers;\n  const authString = \"${AuthString}\";\n\
          \  const basicAuthHeader = headers.authorization && headers.authorization.value\
          \ && headers.authorization.value.split(' ')[1];\n\n  // Check for the presence\
          \ of the Authorization header\n  if (basicAuthHeader && (atob(basicAuthHeader)\
          \ === authString)) {\n    return request;\n  }\n\n  // If the header is\
          \ missing or incorrect, return a 401 Unauthorized response\n  return {\n\
          \    statusCode: 401,\n    statusDescription: 'Unauthorized',\n    headers:\
          \ {\n      'www-authenticate': { value: 'Basic realm=\"KBK Users\"' }\n\
          \    }\n  }\n}\n"
      FunctionConfig:
        Comment: Authentication function for KBK History site
        Runtime: cloudfront-js-2.0
  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        ViewerCertificate:
          AcmCertificateArn:
            Ref: SSLCertificateArn
          MinimumProtocolVersion: TLSv1
          SslSupportMethod: sni-only
        Enabled: true
        Aliases:
        - Fn::Sub: ${HostName}.${DomainName}
        Origins:
        - Id: S3Origin
          DomainName:
            Fn::Sub: ${ContentBucket.DomainName}
          S3OriginConfig:
            OriginAccessIdentity: ''
          OriginAccessControlId:
            Fn::Sub: ${OriginAccess.Id}
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          AllowedMethods:
          - GET
          - HEAD
          - OPTIONS
          CachedMethods:
          - GET
          - HEAD
          - OPTIONS
          Compress: true
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          ViewerProtocolPolicy: redirect-to-https
          FunctionAssociations:
          - EventType: viewer-request
            FunctionARN:
              Ref: CloudFrontAuthFunction
        DefaultRootObject: index.html
Outputs:
  ContentBucketName:
    Value:
      Ref: ContentBucket
  CloudFrontDomainName:
    Value:
      Fn::GetAtt:
      - CloudFrontDistribution
      - DomainName
